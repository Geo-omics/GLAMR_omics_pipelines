jobs: 500
local-cores: 1
#cluster: "sbatch --parsable --account={resources.account} --partition={resources.partition} --time={resources.time_min} --mem={resources.mem_mb} -c {resources.cpus} --gres=gpu:{resources.gpu} -o logs/slurm/{rule}_{wildcards} -e logs/slurm/{rule}_{wildcards}"
#cluster-cancel: "scancel"
#cluster-status: "slurm-status.py"
slurm: true
use-conda: true
conda-frontend: mamba
use-singularity: true
default-resources: [cpus=1, mem_mb=8000, time_min=120, slurm_account="gdick2", slurm_partition="standard", heavy_network=0, gpu=0, slurm_extra="-o logs/slurm/{rule}_{wildcards} -e logs/slurm/{rule}_{wildcards}"]
resources: [cpus=1500, mem_mb=3500000, heavy_network=1]
latency-wait: 60
max-status-checks-per-second: 1
singularity-args: "--home /home/$USER:/home/$USER --bind /scratch/gdick_root/ --bind /nfs/turbo/lsa-gdick2/geomicro/data2/kiledal/ --bind /gpfs/accounts/gdick_root/ --bind /nfs:/nfs"
rerun-triggers: mtime